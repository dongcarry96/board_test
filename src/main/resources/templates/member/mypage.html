<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .type-cell {
            width: 80px;
        }
        .create-cell {
            width: 180px;
        }
        .no-cell {
            width: 60px;
        }
        .title-cell {
            width: auto;
        }
        .pagination {
            margin-top: 20px;
        }
        .board-type {
            margin-bottom: 10px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .pagination ul {
            display: flex;
            list-style: none;
            padding: 0;
        }
        .pagination li {
            margin: 0 5px;
        }
        .pagination li.active a {
            background-color: #007bff;
            color: white;
        }
        .pagination li a {
            padding: 5px 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .pagination li.disabled a {
            color: #ccc;
            pointer-events: none;
        }
        .button-group {
            float: right;
        }
    </style>
    <title>게시판 목록</title>
</head>
<body>
<div class="container">
    <div class="header">
        <a th:href="@{/member/login}" sec:authorize="isAnonymous()">Login</a>
        <a th:href="@{/member/join}" sec:authorize="isAnonymous()">Join</a>
    </div>

        <table>
            <div>마지막 열람한 게시글</div>
            <thead>
            <tr>
                <th class="no-cell">번호</th>
                <th class="title-cell">제목</th>
                <th class="no-cell">타입</th>
                <th class="no-cell">작성자</th>
                <th class="no-cell">조회수</th>
                <th class="create-cell">작성시간</th>
            </tr>
            </thead>
            <tbody>
                <td th:text="${lastViewedBoard.boardNum}"></td>
                <td>
                    <a th:href="@{'/board/read/' + ${lastViewedBoard.boardType} + '/' + ${lastViewedBoard.boardNum}}"
                       th:text="${lastViewedBoard.boardTitle}">
                    </a>
                </td>
                <td th:text="${boardTypeMap[lastViewedBoard.boardType]}"></td>
                <td th:text="${lastViewedBoard.creator}"></td>
                <td th:text="${lastViewedBoard.boardHit}"></td>
                <td th:text="${lastViewedBoard.createTime}"></td>
<!--            </tr>-->
            </tbody>
        </table>
    </br>
    <table>
        <div>내가 쓴 게시글 목록</div>
        <thead>
        <tr>
            <th class="no-cell">번호</th>
            <th class="title-cell">제목</th>
            <th class="no-cell">타입</th>
            <th class="no-cell">작성자</th>
            <th class="no-cell">조회수</th>
            <th class="create-cell">작성시간</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${myBoards.content}">
            <td th:text="${board.boardNum}"></td>
            <td>
                <a th:href="@{'/board/read/' + ${board.boardType} + '/' + ${board.boardNum}}"
                   th:text="${board.boardTitle}">
                </a>
            </td>
            <td th:text="${boardTypeMap[board.boardType]}"></td>
            <td th:text="${board.creator}"></td>
            <td th:text="${board.boardHit}"></td>
            <td th:text="${board.createTime}"></td>
        </tr>
        </tbody>
    </table>

    </br>
    <table>
        <div>내가 쓴 댓글 목록</div>
        <thead>
        <tr>
            <th class="no-cell">번호</th>
            <th class="title-cell">댓글내용</th>
            <th class="no-cell">작성자</th>
            <th class="create-cell">작성시간</th>
            <th class="create-cell">수정시간</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${myComments.content}">
            <td th:text="${comment.commentId}"></td>
            <td>
                <a th:href="@{'/board/read/' + ${comment.boardType} + '/' + ${comment.boardNum}}"
                   th:text="${comment.commentContent}">
                </a>
            </td>
            <td th:text="${comment.creator}"></td>
            <td th:text="${comment.createTime}"></td>
            <td th:text="${comment.modifiedTime}"></td>

        </tr>
        </tbody>
    </table>



    <div class="button-group">
        <form th:action="@{/member/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline;">
            <button type="submit">Logout</button>
        </form>
    </div>
</div>
</body>
<script th:if="${errorMessage != null}">
    alert("[[${errorMessage}]]");
</script>
<script>

</script>
</html>
