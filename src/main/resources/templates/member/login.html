<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            width: 100px;
            text-align: right;
            margin-right: 15px;
            font-weight: bold;
        }
        .form-control {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-submit {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #0056b3;
        }
        .error-message {
            color: red;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .remember-me {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }
        .remember-me input {
            margin-right: 5px;
        }
    </style>
    <title>로그인</title>
</head>
<header>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="/board/list">해오름인포텍</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="/board/list">게시글</a></li>
                <li><a href="/mypage/me">마이페이지</a></li>
            </ul>
        </div>
    </nav>
</header>
<body>
<div class="container">
    <h2>로그인</h2>

    <!-- 안내 메시지 -->
    <div class="success-message" th:if="${param.joined}">
        회원가입 완료! 이메일 인증 후 로그인해주세요.
    </div>
    <div class="success-message" th:if="${param.verify == 'success'}">
        이메일 인증 완료! 로그인해주세요.
    </div>
    <div class="error-message" th:if="${param.verify == 'expired'}">
        인증 링크가 만료됐습니다. 다시 가입해주세요.
    </div>
    <div class="error-message" th:if="${param.verify == 'invalid'}">
        유효하지 않은 인증 링크입니다.
    </div>

    <div class="error-message" id="errorMessage" style="display:none;"></div>

    <div class="form-group">
        <label for="userId">아이디</label>
        <input type="text" class="form-control" id="userId" placeholder="아이디를 입력하세요">
    </div>

    <div class="form-group">
        <label for="userPw">비밀번호</label>
        <input type="password" class="form-control" id="userPw" placeholder="비밀번호를 입력하세요">
    </div>

    <div style="display: flex; justify-content: center;">

    <button style="width: 90px" type="button" class="btn-submit" onclick="login()">Login</button>

    <div class="links" style="width: 90px">
        <a th:href="@{/member/join}">Join</a>
    </div>
    </div>
</div>

<script>
    async function login() {
        const userId = document.getElementById('userId').value;
        const userPw = document.getElementById('userPw').value;

        if (!userId || !userPw) {
            showError('아이디와 비밀번호를 입력해주세요.');
            return;
        }

        try {
            const response = await fetch('/member/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, userPw })
            });

            const data = await response.json();

            if (response.ok) {
                location.href = '/board/list';
            } else {
                showError(data.message || '로그인에 실패했습니다.');
            }

        } catch (e) {
            showError('서버 연결에 실패했습니다.');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
