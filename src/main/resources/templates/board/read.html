<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <style>
        .view-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .label { font-weight: bold; }
        .content { margin: 10px 0; }
        .btn-group { margin-top: 20px; float: right;}
    </style>
</head>
<body>
<div class="container">
    <div class="view-group">
        <span class="label">NO:</span>
        <div class="content" th:text="${num}"></div>
    </div>

    <div class="view-group">
        <span class="label">Title:</span>
        <div class="content" th:text="${board.boardTitle}"></div>
    </div>

    <div class="view-group">
        <span class="label">Comment:</span>
        <div class="content" th:text="${board.boardComment}"></div>
    </div>

    <div class="view-group">
        <span class="label">Type:</span>
        <div class="content" th:text="${type}"></div>
    </div>

    <div class="view-group">
        <span class="label">Writer:</span>
        <div class="content" th:text="${board.creator}"></div>
    </div>
    <div>
        <span class="label">조회수</span>
        <div class="content" th:text="${board.boardHit}"></div>
    </div>
    <h3>댓글 <span th:text="${#lists.size(comments)}"></span>개</h3>

    <div th:each="comment : ${comments}" style="border-bottom: 1px solid #eee; padding: 8px 0;">
        <div th:if="${editCommentId != comment.commentId}">
            <span th:text="${comment.creator}"></span>
            <span style="color:gray; font-size:0.85em;" th:text="${comment.modifiedTime}"></span>
            <p th:text="${comment.commentContent}"></p>
            <div th:if="${#authentication.name == comment.creator}">
                <a th:href="@{'/board/read/' + ${board.boardType} + '/' + ${board.boardNum} + '?editCommentId=' + ${comment.commentId}}">수정</a>

                <form th:action="@{'/comment/delete/' + ${comment.commentId}}" method="post" style="display:inline;">
                    <input type="hidden" name="boardType" th:value="${board.boardType}">
                    <input type="hidden" name="boardNum" th:value="${board.boardNum}">
                    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </div>
        </div>

        <div th:if="${editCommentId == comment.commentId}">
            <form th:action="@{'/comment/update/' + ${comment.commentId}}" method="post">
                <input type="hidden" name="boardType" th:value="${board.boardType}">
                <input type="hidden" name="boardNum" th:value="${board.boardNum}">
                <textarea name="commentContent" th:text="${comment.commentContent}" rows="2" style="width:100%;"></textarea>
                <button type="submit">저장</button>
                <a th:href="@{'/board/read/' + ${board.boardType} + '/' + ${board.boardNum}}">취소</a>
            </form>
        </div>
    </div>

    <form th:action="@{/comment/save}" method="post" style="margin-top: 15px;">
        <input type="hidden" name="boardType" th:value="${board.boardType}">
        <input type="hidden" name="boardNum" th:value="${board.boardNum}">
        <textarea name="commentContent" rows="3" placeholder="댓글을 입력하세요." style="width:100%;"></textarea>
        <button type="submit">댓글 작성</button>
    </form>

    <div>
        <ul>
            <div th:if="${prevBoard != null}">
                <span>이전글 :</span>
                <a th:href="@{'/board/read/' + ${prevBoard.boardType} + '/' + ${prevBoard.boardNum}}"
                   th:text="${prevBoard.boardTitle}">
                </a>
            </div>

            <div th:if="${nextBoard != null}">
                <span>다음글 :</span>
                <a th:href="@{'/board/read/' + ${nextBoard.boardType} + '/' + ${nextBoard.boardNum}}"
                   th:text="${nextBoard.boardTitle}">
                </a>
            </div>
        </ul>
    </div>

    <div class="btn-group">
        <div>

            <form th:action="@{'/board/delete/' + ${board.boardType} + '/' + ${board.boardNum}}"
                  method="post">
                <button type="submit">게시글 삭제</button>
            </form>
        </div>
        <a th:href="@{/board/list}" class="btn">List</a>
        <a th:href="@{'/board/update/' + ${board.boardType} + '/' + ${board.boardNum}}" class="btn">Update</a>
    </div>


</div>
</body>
<script th:if="${errorMessage != null}">
    alert("[[${errorMessage}]]");
</script>
</html>
