<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <style>
        .view-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .label { font-weight: bold; }
        .content { margin: 10px 0; }
        .btn-group { margin-top: 20px; float: right;}
    </style>
</head>
<body>
<div class="container">
    <div class="view-group">
        <span class="label">NO:</span>
        <div class="content" th:text="${num}"></div>
    </div>

    <div class="view-group">
        <span class="label">Title:</span>
        <div class="content" th:text="${board.boardTitle}"></div>
    </div>

    <div class="view-group">
        <span class="label">Comment:</span>
        <div class="content" th:text="${board.boardComment}"></div>
    </div>

    <div class="view-group">
        <span class="label">Type:</span>
        <div class="content" th:text="${type}"></div>
    </div>

    <div class="view-group">
        <span class="label">Writer:</span>
        <div class="content" th:text="${board.creator}"></div>
    </div>
    <div>
        <span class="label">조회수</span>
        <div class="content" th:text="${board.boardHit}"></div>
    </div>
    <div>

        <form th:action="@{'/board/delete/' + ${board.boardType} + '/' + ${board.boardNum}}"
              method="post">
            <button type="submit">삭제</button>
        </form>
    </div>

    <div class="btn-group">
        <a th:href="@{/board/list}" class="btn">List</a>
        <a th:href="@{'/board/update/' + ${board.boardType} + '/' + ${board.boardNum}}" class="btn">Update</a>
    </div>


</div>
</body>
</html>
