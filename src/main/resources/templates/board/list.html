<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<head>
    <meta charset="UTF-8">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .type-cell {
            width: 80px;
        }
        .create-cell {
            width: 180px;
        }
        .no-cell {
            width: 60px;
        }
        .title-cell {
            width: auto;
        }
        .pagination {
            margin-top: 20px;
        }
        .board-type {
            margin-bottom: 10px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .pagination ul {
            display: flex;
            list-style: none;
            padding: 0;
        }
        .pagination li {
            margin: 0 5px;
        }
        .pagination li.active a {
            background-color: #007bff;
            color: white;
        }
        .pagination li a {
            padding: 5px 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .pagination li.disabled a {
            color: #ccc;
            pointer-events: none;
        }
        .button-group {
            float: right;
        }
    </style>
    <title>게시판 목록</title>
</head>
<header>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="/board/list">해오름인포텍</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="/board/list">게시글</a></li>
                <li><a href="/mypage/me">마이페이지</a></li>
            </ul>
        </div>
    </nav>
</header>
<body>
<div class="container">
    <div class="header">
        <a th:href="@{/member/login}" sec:authorize="isAnonymous()">Login</a>
        <a th:href="@{/member/join}" sec:authorize="isAnonymous()">Join</a>
    </div>
    <span style="float: right;">
        total: [[${boardList.totalElements}]]
    </span>

    <form th:action="@{/board/list}" method="get">
        <div class="board-type">
            <th:block th:each="menu : ${menuCode}">
                <input type="checkbox"
                       name="type"
                       th:value="${menu.id.codeId}"
                       th:id="${'type-' + menu.id.codeId}"
                       th:checked="${selectedTypes.contains(menu.id.codeId)}">
                <label th:for="${'type-' + menu.id.codeId}" th:text="${menu.codeName}"></label>
            </th:block>
            <select name="sort">
                <option value="date" th:selected="${selectedSort == 'date'}">최신순</option>
                <option value="hit"  th:selected="${selectedSort == 'hit'}">조회수순</option>
            </select>
        </div>

        <div style="margin: 8px 0;">
            <select name="searchType">
                <option value="title"   th:selected="${selectedSearchType == 'title'}">제목</option>
                <option value="creator" th:selected="${selectedSearchType == 'creator'}">작성자</option>
                <option value="keyword" th:selected="${selectedSearchType == 'keyword'}">키워드</option>
            </select>
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   placeholder="검색어를 입력하세요">
        <input type="hidden" name="page" value="0">
        <input type="hidden" name="size" th:value="${boardList.size}">
        <button type="submit">조회</button>
        </div>

    </form>
    <form id="checkDeleteForm" th:action="@{/board/delete/check}" method="post">
    <table>
        <thead>
        <tr>
            <th class="no-cell">No</th>
            <th class="no-cell">Type</th>
            <th class="title-cell">Title</th>
            <th class="no-cell">작성자</th>
            <th class="no-cell">Hit</th>
            <th class="create-cell">생성일자</th>
            <th class="no-cell"><input type="checkbox" id="checkAll" title="전체선택"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boardList.content}">
            <td th:text="${board.boardNum}"></td>
            <td th:text="${boardTypeMap[board.boardType]}"></td>
            <td>
                <a th:href="@{'/board/read/' + ${board.boardType} + '/' + ${board.boardNum}}"
                   th:text="${board.boardTitle}">
                </a>
            </td>
            <td th:text="${board.creator}"></td>
            <td th:text="${board.boardHit}"></td>
            <td th:text="${board.createTime}"></td>
            <td>
                <input type="checkbox"
                       name="boardIds"
                       th:value="${board.boardType + ':' + board.boardNum}">
            </td>
        </tr>
        </tbody>
    </table>
    </form>



    <div class="pagination" th:if="${boardList.totalPages > 0}">
        <ul>
            <li th:class="${boardList.first ? 'disabled' : ''}">
                <a th:if="${not boardList.first}"
                   th:href="@{/board/list(page=${boardList.number - 1}, size=${boardList.size},
                          type=${param.type}, sort=${selectedSort},
                          searchType=${selectedSearchType}, keyword=${keyword})}">이전</a>
            </li>

            <li th:each="pageNum : ${#numbers.sequence(0, boardList.totalPages - 1)}"
                th:class="${pageNum == boardList.number ? 'active' : ''}">
                <a th:href="@{/board/list(page=${pageNum}, size=${boardList.size},
                          type=${param.type}, sort=${selectedSort},
                          searchType=${selectedSearchType}, keyword=${keyword})}"
                   th:text="${pageNum + 1}"></a>
            </li>

            <li th:class="${boardList.last ? 'disabled' : ''}">
                <a th:if="${not boardList.last}"
                   th:href="@{/board/list(page=${boardList.number + 1}, size=${boardList.size},
                          type=${param.type}, sort=${selectedSort},
                          searchType=${selectedSearchType}, keyword=${keyword})}">다음</a>
            </li>
        </ul>
    </div>

    <div class="button-group">
        <button type="button" onclick="submitCheckDelete()" class="delete-btn">선택 삭제</button>
        <a th:href="@{/board/register}" class="write-btn">글쓰기</a>
        <form th:action="@{/member/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline;">
            <button type="submit">Logout</button>
        </form>
    </div>
</div>
</body>
<script th:if="${errorMessage != null}">
    alert("[[${errorMessage}]]");
</script>
<script>
    document.getElementById('checkAll').addEventListener('change', function () {
        const checkboxes = document.querySelectorAll('#checkDeleteForm input[name="boardIds"]');
        checkboxes.forEach(cb => cb.checked = this.checked);
    });

    document.querySelectorAll('#checkDeleteForm input[name="boardIds"]').forEach(cb => {
        cb.addEventListener('change', function () {
            const all = document.querySelectorAll('#checkDeleteForm input[name="boardIds"]');
            const checked = document.querySelectorAll('#checkDeleteForm input[name="boardIds"]:checked');
            document.getElementById('checkAll').checked = all.length === checked.length;
        });
    });

    function submitCheckDelete() {
        const checked = document.querySelectorAll('#checkDeleteForm input[name="boardIds"]:checked');
        if (checked.length === 0) {
            alert('삭제할 게시글을 선택해주세요.');
            return;
        }
        if (confirm(checked.length + '개의 게시글을 삭제하시겠습니까?')) {
            document.getElementById('checkDeleteForm').submit();
        }
    }
</script>
</html>
