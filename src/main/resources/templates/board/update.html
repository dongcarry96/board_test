<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; }
        textarea { min-height: 200px; }
        .btn-group { margin-top: 20px; float: right;}
    </style>
</head>
<header>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="/board/list">해오름인포텍</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="/board/list">게시글</a></li>
                <li><a href="/mypage/me">마이페이지</a></li>
            </ul>
        </div>
    </nav>
</header>
<body>
    <h2>게시글 수정</h2>
    <div class="container">
    <form th:action="@{'/board/update/' + ${boardDto.boardType} + '/' + ${boardDto.boardNum}}"
          method="post">

        <label for="Type">게시글 타입</label>
        <select id="Type" name="boardType" required>
            <option value="" disabled selected>게시글 타입 선택</option>
            <option th:each="menu : ${comCodes}"
                    th:value="${menu.id.codeId}"
                    th:text="${menu.codeName}">
            </option>
        </select>

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="boardTitle" th:value="${boardDto.boardTitle}">
        </div>

        <div class="form-group">
            <label>Comment</label>
            <input type="text" name="boardComment" th:value="${boardDto.boardComment}"></input>
        </div>



        <div class="form-group">
            <label>Writer</label>
            <input type="text" th:value="${boardDto.creator}" readonly>
        </div>

        <div class="form-group">
            <label>첨부파일</label>

            <div id="currentFileArea" th:if="${originalFileName != null}">
                <div class="file-box">
                    📎 <span th:text="${originalFileName}"></span>
                    <button type="button" class="delete-btn" onclick="removeCurrentFile()">✕ 삭제</button>
                </div>
            </div>

            <input type="hidden" id="deleteFile" name="deleteFile" value="false">

            <div id="newFileArea" style="margin-top: 8px;">
                <input type="file" id="file" name="file">
                <div class="file-name" id="fileNameDisplay"></div>
            </div>

            <div class="btn-group">
                <a th:href="@{/board/list}" class="btn">List</a>
                <a th:href="@{'/board/update/' + ${boardDto.boardType} + '/' + ${boardDto.boardNum}}">
                <button type="submit">Update</button>
                </a>
            </div>
    </form>
    </div>

<script>
    function removeCurrentFile() {
        document.getElementById('currentFileArea').style.display = 'none';
        document.getElementById('deleteFile').value = 'true';
    }

    document.getElementById('file').addEventListener('change', function () {
        const display = document.getElementById('fileNameDisplay');
        display.textContent = this.files.length > 0 ? '선택된 파일: ' + this.files[0].name : '';
    });
</script>
</body>
</html>
