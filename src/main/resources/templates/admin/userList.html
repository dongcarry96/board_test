<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<head>
    <meta charset="UTF-8">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .type-cell {
            width: 80px;
        }
        .create-cell {
            width: 180px;
        }
        .no-cell {
            width: 60px;
        }
        .title-cell {
            width: auto;
        }
        .pagination {
            margin-top: 20px;
        }
        .board-type {
            margin-bottom: 10px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .pagination ul {
            display: flex;
            list-style: none;
            padding: 0;
        }
        .pagination li {
            margin: 0 5px;
        }
        .pagination li.active a {
            background-color: #007bff;
            color: white;
        }
        .pagination li a {
            padding: 5px 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .pagination li.disabled a {
            color: #ccc;
            pointer-events: none;
        }
        .button-group {
            float: right;
        }
    </style>
    <title>관리자 페이지</title>
</head>
<body>
<header>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">관리자 페이지</a>
            </div>
            <ul class="nav navbar-nav">
                <li class="active"><a href="/admin/user/list">회원목록</a></li>
                <li><a href="/admin/board/list">게시글목록</a></li>
                <li><a href="/admin/comment/list">댓글목록</a></li>
                <li><a href="/admin/log/list">로그목록</a></li>
            </ul>
        </div>
    </nav>
</header>
<div class="container">

    <table>
        <thead>
        <tr>
            <th class="create-cell">회원ID</th>
            <th class="create-cell">회원명</th>
            <th class="create-cell">이메일</th>
            <th class="create-cell">전화번호</th>
            <th class="create-cell">주소</th>
            <th class="create-cell">주소</th>
            <th class="create-cell">회사</th>
            <th class="create-cell">권한</th>
            <th class="create-cell">승인여부</th>
            <th class="create-cell">삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${userList.content}">
            <td th:text="${user.userId}"></td>
            <td th:text="${user.userName}"></td>
            <td th:text="${user.userEmail}"></td>
            <td th:text="${user.userPhone1 + '-' + user.userPhone2 + '-' + user.userPhone3}"></td>
            <td th:text="${user.userAddr1}"></td>
            <td th:text="${user.userAddr2}"></td>
            <td th:text="${user.userCompany}"></td>
            <td th:text="${user.userRole}"></td>
            <td th:text="${user.emailVerified}"></td>
            <td>
                <form th:action="@{'/admin/user/delete/' + ${user.userId}}"
                      method="post">
                    <button type="submit">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
