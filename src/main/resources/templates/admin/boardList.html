<head>
    <meta charset="UTF-8">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .type-cell {
            width: 80px;
        }
        .create-cell {
            width: 180px;
        }
        .no-cell {
            width: 60px;
        }
        .title-cell {
            width: auto;
        }
        .pagination {
            margin-top: 20px;
        }
        .board-type {
            margin-bottom: 10px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .pagination ul {
            display: flex;
            list-style: none;
            padding: 0;
        }
        .pagination li {
            margin: 0 5px;
        }
        .pagination li.active a {
            background-color: #007bff;
            color: white;
        }
        .pagination li a {
            padding: 5px 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .pagination li.disabled a {
            color: #ccc;
            pointer-events: none;
        }
        .button-group {
            float: right;
        }
    </style>
    <title>관리자 페이지</title>
</head>
<header>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">관리자 페이지</a>
            </div>
            <ul class="nav navbar-nav">
                <li><a href="/admin/user/list">회원목록</a></li>
                <li class="active"><a href="/admin/board/list">게시글목록</a></li>
                <li><a href="/admin/comment/list">댓글목록</a></li>
                <li><a href="/admin/log/list">로그목록</a></li>
            </ul>
        </div>
    </nav>
</header>
<body>
<div class="container">

    <table>
        <thead>
        <tr>
            <th class="create-cell">번호</th>
            <th class="create-cell">제목</th>
            <th class="create-cell">내용</th>
            <th class="create-cell">타입</th>
            <th class="create-cell">조회수</th>
            <th class="create-cell">작성자</th>
            <th class="create-cell">수정자</th>
            <th class="create-cell">작성시간</th>
            <th class="create-cell">수정시간</th>
            <th class="create-cell">삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boardList.content}">
            <td th:text="${board.boardNum}"></td>
            <td th:text="${board.boardTitle}"></td>
            <td th:text="${board.boardComment}"></td>
            <td th:text="${codeMap[board.boardType]}"></td>
            <td th:text="${board.boardHit}"></td>
            <td th:text="${board.creator}"></td>
            <td th:text="${board.modifier}"></td>
            <td th:text="${board.createTime}"></td>
            <td th:text="${board.modifiedTime}"></td>
            <td>
                <form th:action="@{'/admin/board/delete/' + ${board.boardType} + '/' + ${board.boardNum}}"
                      method="post">
                    <button type="submit">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
